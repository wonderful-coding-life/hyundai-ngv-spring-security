<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품목록</title>
</head>
<body>
<table>
    <tr th:object="${product}" th:each="product : ${products}">
        <td th:text="*{id}">100</td>
        <td th:text="*{name}">iPhone</td>
        <td th:text="*{price}">1,200,000</td>
        <td><a th:href="@{/product/edit(id=*{id})}">수정</a></td>
        <td><a th:href="@{/product/delete(id=*{id})}">삭제</a></td>
    </tr>
</table>
<a th:href="@{/}">홈</a>
</body>
</html>
